name: llm

channels:
  - conda-forge

dependencies:
  # Core
  - python=3.11
  - pip

  # Jupyter
  - ipykernel
  - jupyterlab
  - ipywidgets
  - widgetsnbextension
  - ipyfilechooser=0.6.0

  # Scientific / Data
  - numpy
  - scipy
  - pandas
  - matplotlib
  - xarray
  - h5py
  - h5netcdf
  - netcdf4
  - zarr>=3.0
  - numcodecs>=0.14

  # IO / Cloud / Web
  - requests
  - aiohttp
  - fsspec
  - s3fs
  - boto3
  - botocore
  - gdown
  - rich

  # Geospatial
  - geopandas
  - rasterio
  - rioxarray
  - pyproj
  - shapely
  - fiona
  - gdal
  - libgdal-netcdf

  # Mapping / Visualization
  - folium
  - branca
  - ipyleaflet
  - localtileserver
  - leafmap
  - pillow

  # Remote sensing / InSAR
  - mintpy

  # Pip-only packages
  - pip:
      - opera-utils      

